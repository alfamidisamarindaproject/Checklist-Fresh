<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alfamidi Fresh Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .card-glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .gradient-midi { background: linear-gradient(135deg, #ED1C24 0%, #C8102E 100%); }
        .tap-marker { position: absolute; width: 30px; height: 30px; background: rgba(237, 28, 36, 0.8); border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; pointer-events: none; box-shadow: 0 0 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="pb-10">

    <div class="gradient-midi pt-8 pb-16 px-6 rounded-b-[40px] shadow-lg">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-white text-2xl font-bold italic">Alfamidi <span class="text-yellow-400">Fresh</span></h1>
                <p class="text-red-100 text-sm">E-Checklist Monitoring Display</p>
            </div>
            <div class="bg-white/20 p-2 rounded-full">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
            </div>
        </div>
    </div>

    <main class="max-w-md mx-auto px-4 -mt-10">
        <form id="mainForm" class="space-y-4">
            
            <div class="card-glass p-5 rounded-3xl shadow-sm space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Lokasi Toko</label>
                    <input type="text" id="toko" placeholder="Contoh: MIDI Gatsu 2" class="w-full mt-1 px-4 py-3 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-red-500 transition-all outline-none" required>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Petugas (PIC)</label>
                    <input type="text" id="pic" placeholder="Nama Anda" class="w-full mt-1 px-4 py-3 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-red-500 transition-all outline-none" required>
                </div>
            </div>

            <div class="card-glass p-5 rounded-3xl shadow-sm">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-wider block mb-3">Foto Kondisi Buah/Sayur</label>
                
                <div id="uploadPlaceholder" class="relative border-2 border-dashed border-gray-200 rounded-2xl p-8 text-center hover:bg-red-50 transition-colors cursor-pointer">
                    <input type="file" id="photoInput" accept="image/*" capture="environment" class="absolute inset-0 opacity-0 cursor-pointer">
                    <div class="space-y-2">
                        <div class="bg-red-100 w-12 h-12 rounded-full flex items-center justify-center mx-auto">
                            <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        </div>
                        <p class="text-sm font-medium text-gray-600">Ambil Foto Display</p>
                    </div>
                </div>

                <div id="previewWrapper" class="hidden">
                    <p class="text-[10px] text-red-500 mb-2 font-bold uppercase underline">Petunjuk: Ketuk pada gambar jika ada buah yang rusak/busuk</p>
                    <div class="relative inline-block w-full overflow-hidden rounded-2xl border bg-black" id="imageContainer">
                        <img id="imagePreview" class="w-full block">
                        </div>
                    <button type="button" id="resetPhoto" class="mt-2 text-xs text-gray-500 font-semibold flex items-center gap-1">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> Ganti Foto
                    </button>
                </div>
            </div>

            <div class="card-glass p-5 rounded-3xl shadow-sm">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-wider block mb-3">Status Kelayakan</label>
                <div class="flex gap-3">
                    <button type="button" onclick="setStatus('Layak')" id="btnLayak" class="flex-1 py-3 rounded-2xl border-2 border-gray-100 font-bold text-gray-400 transition-all">LAYAK</button>
                    <button type="button" onclick="setStatus('Tidak Layak')" id="btnTidakLayak" class="flex-1 py-3 rounded-2xl border-2 border-gray-100 font-bold text-gray-400 transition-all">TIDAK LAYAK</button>
                </div>
                <textarea id="catatan" rows="2" class="w-full mt-4 px-4 py-3 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-red-500 outline-none" placeholder="Catatan tambahan (Opsional)"></textarea>
            </div>

            <button type="submit" id="submitBtn" class="w-full gradient-midi text-white font-bold py-4 rounded-2xl shadow-lg shadow-red-200 active:scale-95 transition-all">
                KIRIM LAPORAN SEKARANG
            </button>
        </form>
    </main>

    <script src="app.js"></script>
</body>
</html>
