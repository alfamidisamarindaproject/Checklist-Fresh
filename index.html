<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRESH MONITORING | ALFAMIDI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap');
        
        :root {
            --primary: #ED1C24;
            --bg: #F2F2F7;
            --radius: 24px;
        }

        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 120px; color: #1C1C1E; }
        
        .brand { font-weight: 800; padding: 40px 25px 10px; font-size: 1.6rem; letter-spacing: -1px; }
        .brand span { color: var(--primary); }

        .glass-card { 
            background: white; border-radius: var(--radius); 
            padding: 24px; margin: 15px; border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .task-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .task-input { display: none; }
        .task-card { 
            background: #F8F8F8; border-radius: 18px; padding: 18px 5px; 
            text-align: center; border: 2px solid transparent; transition: 0.3s;
            cursor: pointer;
        }
        .task-input:checked + .task-card { 
            border-color: #000; background: #FFF; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.08); transform: translateY(-2px);
        }
        .task-card i { font-size: 1.8rem; display: block; margin-bottom: 8px; color: #8E8E93; }
        .task-input:checked + .task-card i { color: var(--primary); }
        .task-card span { font-size: 0.7rem; font-weight: 800; display: block; }

        .cam-box { 
            width: 100%; height: 160px; border-radius: var(--radius); 
            border: 2px dashed #D1D1D6; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; overflow: hidden; 
            position: relative; background: #FFF; transition: 0.2s; cursor: pointer;
        }
        .cam-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 2; display: none; }
        .cam-box i { font-size: 2.5rem; color: #C7C7CC; margin-bottom: 5px; z-index: 1; }
        .cam-box span { font-size: 0.75rem; font-weight: 800; color: #8E8E93; z-index: 1; }

        .btn-submit { 
            position: fixed; bottom: 30px; left: 20px; right: 20px; 
            background: #000; color: white; border: none; padding: 22px; 
            border-radius: var(--radius); font-weight: 800; font-size: 1rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); transition: 0.3s; z-index: 100;
        }
        .btn-submit:disabled { opacity: 0.2; transform: scale(0.95); }
        
        .form-control { border: none; background: #F2F2F7; padding: 15px; border-radius: 15px; font-weight: 700; }
        .form-control:focus { background: #E5E5EA; box-shadow: none; }
    </style>
</head>
<body>

    <div class="brand">FRESH <span>REPORT.</span></div>

    <div class="glass-card">
        <div class="row g-2 mb-4">
            <div class="col-4">
                <label class="small fw-bold text-muted mb-1 ms-1">TOKO</label>
                <input type="text" id="toko" class="form-control" placeholder="SG10">
            </div>
            <div class="col-8">
                <label class="small fw-bold text-muted mb-1 ms-1">NAMA PIC</label>
                <input type="text" id="pic" class="form-control" placeholder="NAMA LENGKAP">
            </div>
        </div>

        <div class="task-grid">
            <label><input type="checkbox" id="culling" class="task-input"><div class="task-card"><i class="ph ph-trash"></i><span>CULLING</span></div></label>
            <label><input type="checkbox" id="trimming" class="task-input"><div class="task-card"><i class="ph ph-scissors"></i><span>TRIMMING</span></div></label>
            <label><input type="checkbox" id="crisping" class="task-input"><div class="task-card"><i class="ph ph-drop"></i><span>CRISPING</span></div></label>
        </div>
    </div>

    <div class="px-3">
        <div class="row g-3">
            <div class="col-6">
                <div class="cam-box" id="box-dis">
                    <i class="ph ph-camera-plus"></i>
                    <span>FOTO DISPLAY</span>
                    <img id="p-dis" src="">
                </div>
                <input type="file" id="in-dis" class="d-none" accept="image/*" capture="environment">
            </div>
            <div class="col-6">
                <div class="cam-box" id="box-rep">
                    <i class="ph ph-package"></i>
                    <span>STOCK REPACK</span>
                    <img id="p-rep" src="">
                </div>
                <input type="file" id="in-rep" class="d-none" accept="image/*" capture="environment">
            </div>
        </div>
    </div>

    <button id="btn-submit" class="btn-submit" disabled>KIRIM REPORT KE GSHEET</button>

    <script src="app.js"></script>
</body>
</html>
