<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRESH MONITORING | ALFAMIDI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        :root {
            --bg: #F2F2F7;
            --primary: #ED1C24; /* Alfamidi Red */
            --accent: #FFCC00; /* Alfamidi Yellow */
            --surface: rgba(255, 255, 255, 0.85);
            --text-main: #1C1C1E;
            --text-sub: #8E8E93;
            --radius-lg: 28px;
            --radius-md: 18px;
        }

        body {
            background-color: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            padding-bottom: 140px;
            -webkit-tap-highlight-color: transparent;
        }

        .header-nav {
            padding: 40px 24px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: -0.5px;
            color: var(--primary);
        }

        .brand span { color: var(--text-main); }

        /* Progress Section */
        .progress-container { padding: 0 24px; margin-bottom: 25px; }
        .progress-bar-custom { height: 6px; background: #E5E5EA; border-radius: 10px; overflow: hidden; }
        #fill-progress { width: 0%; height: 100%; background: var(--primary); transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }

        .section-title {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 30px 0 12px 28px;
        }

        .glass-card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin: 0 16px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
        }

        /* Input Styling */
        .input-group-modern { margin-bottom: 20px; }
        .input-group-modern label { font-size: 0.75rem; font-weight: 700; margin-bottom: 6px; display: block; color: var(--text-sub); padding-left: 4px; }
        .input-group-modern input, .input-group-modern select {
            width: 100%;
            padding: 16px 20px;
            border-radius: var(--radius-md);
            border: 1.5px solid transparent;
            background: rgba(0,0,0,0.04);
            font-weight: 700;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .input-group-modern input:focus { outline: none; background: #FFF; border-color: var(--primary); box-shadow: 0 0 0 5px rgba(237, 28, 36, 0.1); }

        /* Camera Box & Interaction */
        .camera-container {
            position: relative;
            width: 100%;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: rgba(0,0,0,0.04);
            border: 2px dashed #C7C7CC;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .camera-container img { width: 100%; height: auto; display: block; }
        
        .marker {
            position: absolute;
            width: 32px;
            height: 32px;
            background: var(--primary);
            border: 3px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            pointer-events: none;
        }

        .instruction-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            background: rgba(237, 28, 36, 0.9);
            color: white;
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 0.65rem;
            font-weight: 800;
            text-align: center;
            display: none;
            z-index: 10;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px 24px 40px;
            background: rgba(242, 242, 247, 0.8);
            backdrop-filter: blur(15px);
            z-index: 1000;
        }

        .btn-main {
            background: var(--text-main);
            color: white;
            width: 100%;
            padding: 20px;
            border-radius: 22px;
            border: none;
            font-weight: 800;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }

        .btn-main:disabled { opacity: 0.2; }
        .btn-main:not(:disabled):active { transform: scale(0.96); background: var(--primary); }

        #canvas-hidden { display: none; }
    </style>
</head>
<body>

    <div class="header-nav">
        <div class="brand">ALFAMIDI <span>FRESH.</span></div>
        <button class="btn btn-light rounded-pill p-2 px-3" onclick="location.reload()">
            <i class="ph ph-arrow-counter-clockwise fw-bold"></i>
        </button>
    </div>

    <div class="progress-container">
        <div class="progress-bar-custom">
            <div id="fill-progress"></div>
        </div>
    </div>

    <div class="container">
        <div class="section-title">Informasi Toko</div>
        <div class="glass-card">
            <div class="input-group-modern">
                <label>Pilih Toko</label>
                <input type="text" id="toko" placeholder="KODE TOKO (MISAL: SG10)" autocomplete="off">
            </div>
            <div class="input-group-modern mb-0">
                <label>Nama Petugas (PIC)</label>
                <input type="text" id="pic" placeholder="NAMA LENGKAP" autocomplete="off">
            </div>
        </div>

        <div class="section-title">Monitoring Visual</div>
        <div class="glass-card mb-4">
            <div class="camera-container" id="camera-trigger">
                <div id="instruction-tap" class="instruction-overlay">KETUK PADA BUAH YANG TIDAK LAYAK</div>
                
                <div id="placeholder-ui" class="text-center">
                    <i class="ph ph-camera-plus" style="font-size: 3.5rem; color: var(--primary);"></i>
                    <p class="small fw-bold mt-2" style="color: var(--text-sub);">AMBIL FOTO DISPLAY</p>
                </div>

                <div id="image-wrapper" class="position-relative w-100 h-100" style="display: none;">
                    <img id="preview-img" src="">
                    </div>

                <input type="file" id="file-input" class="d-none" accept="image/*" capture="environment">
            </div>
            
            <div class="mt-3">
                <div class="input-group-modern mb-0">
                    <label>Catatan Temuan</label>
                    <input type="text" id="catatan" placeholder="MISAL: APEL MEMAR, PISANG BUSUK">
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button id="btn-submit" class="btn-main shadow-lg" disabled>
            <span>KIRIM LAPORAN</span>
            <i class="ph ph-paper-plane-tilt-bold"></i>
        </button>
    </div>

    <canvas id="canvas-hidden"></canvas>

    <script src="app.js"></script>
</body>
</html>
