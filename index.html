<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRESH MONITORING | ALFAMIDI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap');
        body { background: #F2F2F7; font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 120px; }
        .brand { font-weight: 800; color: #000; padding: 40px 25px 10px; font-size: 1.5rem; }
        .brand span { color: #ED1C24; }
        .glass-card { background: white; border-radius: 28px; padding: 25px; margin: 15px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        
        /* Checklist UI */
        .task-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .task-input { display: none; }
        .task-card { background: #F8F8F8; border-radius: 20px; padding: 20px 5px; text-align: center; border: 2px solid transparent; transition: 0.3s; }
        .task-input:checked + .task-card { border-color: #000; background: #FFF; box-shadow: 0 10px 20px rgba(0,0,0,0.08); transform: translateY(-3px); }
        .task-card i { font-size: 1.8rem; display: block; margin-bottom: 8px; color: #8E8E93; }
        .task-input:checked + .task-card i { color: #ED1C24; }
        .task-card span { font-size: 0.7rem; font-weight: 800; }

        /* Camera Box */
        .cam-container { width: 100%; height: 160px; border-radius: 24px; border: 2px dashed #D1D1D6; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; position: relative; background: #FFF; }
        .cam-container img { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 2; }
        .cam-container i { font-size: 2.5rem; color: #C7C7CC; margin-bottom: 5px; }
        
        .btn-submit { position: fixed; bottom: 30px; left: 20px; right: 20px; background: #000; color: white; border: none; padding: 22px; border-radius: 24px; font-weight: 800; z-index: 100; transition: 0.3s; }
        .btn-submit:disabled { opacity: 0.2; }
        .btn-submit:not(:disabled):active { transform: scale(0.95); background: #ED1C24; }
    </style>
</head>
<body>

    <div class="brand">FRESH <span>MONITORING.</span></div>

    <div class="glass-card">
        <div class="row g-2 mb-4">
            <div class="col-4"><input type="text" id="toko" class="form-control border-0 bg-light p-3 rounded-4 fw-bold" placeholder="KODE"></div>
            <div class="col-8"><input type="text" id="pic" class="form-control border-0 bg-light p-3 rounded-4 fw-bold" placeholder="NAMA PIC"></div>
        </div>
        <div class="task-grid">
            <label><input type="checkbox" id="culling" class="task-input"><div class="task-card"><i class="ph ph-trash"></i><span>CULLING</span></div></label>
            <label><input type="checkbox" id="trimming" class="task-input"><div class="task-card"><i class="ph ph-scissors"></i><span>TRIMMING</span></div></label>
            <label><input type="checkbox" id="crisping" class="task-input"><div class="task-card"><i class="ph ph-drop"></i><span>CRISPING</span></div></label>
        </div>
    </div>

    <div class="px-3 row g-3">
        <div class="col-6">
            <div class="cam-container" onclick="document.getElementById('in-dis').click()">
                <i class="ph ph-camera-plus"></i>
                <span class="small fw-bold text-secondary">FOTO DISPLAY</span>
                <img id="p-dis" src="">
            </div>
            <input type="file" id="in-dis" class="d-none" accept="image/*" capture="environment">
        </div>
        <div class="col-6">
            <div class="cam-container" onclick="document.getElementById('in-rep').click()">
                <i class="ph ph-package"></i>
                <span class="small fw-bold text-secondary">STOCK REPACK</span>
                <img id="p-rep" src="">
            </div>
            <input type="file" id="in-rep" class="d-none" accept="image/*" capture="environment">
        </div>
    </div>

    <button id="btn-submit" class="btn-submit shadow-lg" disabled>KIRIM DATA KE GSHEET</button>

    <script>
        const SCRIPT_URL = 'URL_WEB_APP_ANDA'; // GANTI INI
        let photos = { dis: null, rep: null };

        function setupCam(inputId, previewId, key) {
            document.getElementById(inputId).onchange = (e) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    photos[key] = ev.target.result;
                    document.getElementById(previewId).src = ev.target.result;
                    checkValid();
                };
                reader.readAsDataURL(e.target.files[0]);
            };
        }

        setupCam('in-dis', 'p-dis', 'dis');
        setupCam('in-rep', 'p-rep', 'rep');

        function checkValid() {
            const ok = document.getElementById('toko').value && document.getElementById('pic').value && photos.dis && photos.rep;
            document.getElementById('btn-submit').disabled = !ok;
        }

        document.getElementById('toko').oninput = checkValid;
        document.getElementById('pic').oninput = checkValid;

        document.getElementById('btn-submit').onclick = async () => {
            Swal.fire({ title: 'Mengirim...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            const body = {
                toko: document.getElementById('toko').value,
                pic: document.getElementById('pic').value,
                culling: document.getElementById('culling').checked,
                trimming: document.getElementById('trimming').checked,
                crisping: document.getElementById('crisping').checked,
                foto_display: photos.dis,
                foto_repack: photos.rep
            };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(body) });
                Swal.fire('Berhasil!', 'Laporan tersimpan di GSheet & Drive.', 'success').then(() => location.reload());
            } catch (e) {
                Swal.fire('Error', 'Gagal kirim data.', 'error');
            }
        };
    </script>
</body>
</html>
