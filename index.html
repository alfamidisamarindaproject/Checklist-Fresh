<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fresh Monitoring Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #ED1C24; --accent: #1C1C1E; --bg: #F8F9FB; }
        body { background: var(--bg); font-family: 'Inter', system-ui, -apple-system, sans-serif; color: var(--accent); padding-bottom: 120px; }
        
        .header-section { padding: 30px 20px 10px; }
        .header-section h1 { font-weight: 800; font-size: 1.5rem; letter-spacing: -0.5px; margin: 0; }
        .header-section span { color: var(--primary); }

        .app-card { background: white; border-radius: 24px; padding: 22px; margin: 15px; border: 1px solid rgba(0,0,0,0.04); box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        
        .form-label-custom { font-size: 0.7rem; font-weight: 700; color: #A0A0A0; text-transform: uppercase; margin-left: 5px; margin-bottom: 5px; display: block; }
        .form-input-custom { border: 2px solid #F1F1F1; background: #F9F9F9; border-radius: 14px; padding: 12px 16px; font-weight: 600; font-size: 0.95rem; width: 100%; transition: 0.2s; }
        .form-input-custom:focus { border-color: var(--primary); background: white; outline: none; }

        .task-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .task-input { display: none; }
        .task-box { background: #F9F9F9; border-radius: 18px; padding: 18px 5px; text-align: center; border: 2px solid transparent; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .task-input:checked + .task-box { background: white; border-color: var(--primary); box-shadow: 0 10px 20px rgba(237, 28, 36, 0.08); transform: translateY(-3px); }
        .task-box i { font-size: 1.8rem; display: block; margin-bottom: 6px; color: #D1D1D6; transition: 0.2s; }
        .task-input:checked + .task-box i { color: var(--primary); }
        .task-box span { font-size: 0.65rem; font-weight: 800; letter-spacing: 0.3px; }

        .cam-uploader { width: 100%; height: 160px; background: white; border-radius: 24px; border: 2px dashed #E5E5E5; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; position: relative; transition: 0.3s; }
        .cam-uploader:active { transform: scale(0.97); background: #F1F1F1; }
        .cam-uploader img { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 5; display: none; }
        .cam-uploader i { font-size: 2.2rem; color: #D1D1D6; margin-bottom: 5px; }
        .cam-uploader span { font-size: 0.75rem; font-weight: 700; color: #A0A0A0; }

        .btn-floating { position: fixed; bottom: 30px; left: 20px; right: 20px; background: var(--accent); color: white; border: none; padding: 20px; border-radius: 20px; font-weight: 800; font-size: 1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; transition: 0.3s; }
        .btn-floating:disabled { opacity: 0.2; transform: translateY(10px); }
        .btn-floating:not(:disabled):active { transform: scale(0.95); background: var(--primary); }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>FRESH <span>PRO.</span></h1>
    </div>

    <div class="app-card">
        <div class="row g-2">
            <div class="col-4">
                <span class="form-label-custom">KODE</span>
                <input type="text" id="toko" class="form-input-custom" placeholder="SG10">
            </div>
            <div class="col-8">
                <span class="form-label-custom">NAMA PIC</span>
                <input type="text" id="pic" class="form-input-custom" placeholder="Nama Lengkap">
            </div>
        </div>
    </div>

    <div class="app-card">
        <span class="form-label-custom mb-3">Tindakan Fresh</span>
        <div class="task-grid">
            <label><input type="checkbox" id="culling" class="task-input"><div class="task-box"><i class="ph ph-trash"></i><span>CULLING</span></div></label>
            <label><input type="checkbox" id="trimming" class="task-input"><div class="task-box"><i class="ph ph-scissors"></i><span>TRIMMING</span></div></label>
            <label><input type="checkbox" id="crisping" class="task-input"><div class="task-box"><i class="ph ph-drop"></i><span>CRISPING</span></div></label>
        </div>
    </div>

    <div class="row g-3 px-3">
        <div class="col-6">
            <div class="cam-uploader" id="box-dis">
                <i class="ph ph-camera"></i><span>DISPLAY</span><img id="p-dis">
            </div>
            <input type="file" id="in-dis" class="d-none" accept="image/*" capture="environment">
        </div>
        <div class="col-6">
            <div class="cam-uploader" id="box-rep">
                <i class="ph ph-package"></i><span>REPACK</span><img id="p-rep">
            </div>
            <input type="file" id="in-rep" class="d-none" accept="image/*" capture="environment">
        </div>
    </div>

    <button id="btn-submit" class="btn-floating" disabled>KIRIM LAPORAN</button>

    <script src="app.js"></script>
</body>
</html>
