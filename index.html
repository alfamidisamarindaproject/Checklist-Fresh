<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Display Buah & Sayur - Alfamidi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-alfamidi { background-color: #ED1C24; }
        .text-alfamidi { color: #ED1C24; }
        .btn-alfamidi { background-color: #ED1C24; color: white; transition: all 0.3s;}
        .btn-alfamidi:hover { background-color: #C8102E; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <header class="bg-alfamidi shadow-md py-4">
        <div class="container mx-auto px-4">
            <h1 class="text-2xl font-bold text-white text-center flex items-center justify-center gap-2">
                🛒 E-Checklist Display Fresh
            </h1>
            <p class="text-yellow-300 text-center text-sm mt-1">Monitoring Kualitas Produk Alfamidi</p>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-3xl">
        <div class="bg-white rounded-lg shadow-lg p-6">
            
            <form id="checklistForm" class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 font-semibold mb-1">Kode / Nama Toko</label>
                        <input type="text" id="inputToko" placeholder="Contoh: MIDI Sudirman (M123)" class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-red-500 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-1">Nama PIC</label>
                        <input type="text" id="inputPIC" placeholder="Nama Karyawan" class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-red-500 outline-none" required>
                    </div>
                </div>

                <div class="mt-4">
                    <label class="block text-gray-700 font-semibold mb-1">Foto Display (Kamera/Galeri)</label>
                    <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center bg-gray-50">
                        <input type="file" id="photoInput" accept="image/*" capture="environment" class="w-full text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-red-100 file:text-red-700 cursor-pointer">
                    </div>
                </div>

                <div class="mt-4 hidden" id="previewArea">
                    <h3 class="text-gray-700 font-semibold mb-2">Preview Foto & Analisis:</h3>
                    <div class="w-full overflow-hidden rounded-lg border flex justify-center bg-black">
                        <canvas id="imageCanvas" class="max-w-full h-auto"></canvas>
                    </div>
                    
                    <div class="mt-4 flex flex-col sm:flex-row justify-between items-center gap-4">
                        <button type="button" id="btnDeteksi" class="btn-alfamidi px-4 py-2 rounded-md font-semibold w-full sm:w-auto">
                            🔍 Cek Kelayakan (Simulasi AI)
                        </button>
                        <div id="statusResult" class="font-bold text-lg text-center w-full sm:w-auto"></div>
                    </div>
                </div>

                <div class="mt-4">
                    <label class="block text-gray-700 font-semibold mb-1">Catatan Tambahan</label>
                    <textarea id="inputCatatan" rows="3" class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-red-500 outline-none" placeholder="Contoh: Ada apel memar di rak atas..."></textarea>
                </div>

                <div class="mt-6 border-t pt-6">
                    <button type="submit" id="btnSubmit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-md transition duration-300">
                        Kirim Laporan Checklist
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
