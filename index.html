<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fresh Monitor v3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --midi-red: #ED1C24; --bg: #F2F2F7; }
        body { background: var(--bg); font-family: sans-serif; padding-bottom: 100px; }
        .card-main { background: white; border-radius: 20px; padding: 20px; margin: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .input-style { background: #F2F2F7; border: none; border-radius: 12px; padding: 12px; font-weight: 600; width: 100%; }
        .check-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .check-item input { display: none; }
        .check-btn { background: #F2F2F7; border-radius: 15px; padding: 15px 5px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .check-item input:checked + .check-btn { border-color: var(--midi-red); background: white; color: var(--midi-red); }
        .check-btn i { font-size: 1.5rem; display: block; margin-bottom: 5px; }
        .upload-area { width: 100%; height: 140px; background: white; border-radius: 18px; border: 2px dashed #D1D1D6; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .upload-area img { width: 100%; height: 100%; object-fit: cover; position: absolute; display: none; z-index: 5; }
        .btn-send { width: calc(100% - 30px); position: fixed; bottom: 20px; left: 15px; background: #000; color: #fff; border: none; padding: 18px; border-radius: 18px; font-weight: 800; }
        .btn-send:disabled { opacity: 0.2; }
    </style>
</head>
<body>
    <div class="card-main">
        <h5 class="fw-bold mb-3">FRESH <span class="text-danger">MONITOR.</span></h5>
        <div class="row g-2">
            <div class="col-4"><input type="text" id="toko" class="input-style" placeholder="SG10"></div>
            <div class="col-8"><input type="text" id="pic" class="input-style" placeholder="NAMA PIC"></div>
        </div>
    </div>

    <div class="card-main">
        <div class="check-grid">
            <label class="check-item"><input type="checkbox" id="culling"><div class="check-btn"><i class="ph ph-trash"></i><span>CULLING</span></div></label>
            <label class="check-item"><input type="checkbox" id="trimming"><div class="check-btn"><i class="ph ph-scissors"></i><span>TRIMMING</span></div></label>
            <label class="check-item"><input type="checkbox" id="crisping"><div class="check-btn"><i class="ph ph-drop"></i><span>CRISPING</span></div></label>
        </div>
    </div>

    <div class="row g-2 px-3">
        <div class="col-6 text-center">
            <span class="small fw-bold text-muted d-block mb-1">FOTO DISPLAY</span>
            <div class="upload-area" onclick="document.getElementById('in-dis').click()">
                <i class="ph ph-camera"></i><img id="p-dis">
            </div>
            <input type="file" id="in-dis" class="d-none" accept="image/*" capture="environment">
        </div>
        <div class="col-6 text-center">
            <span class="small fw-bold text-muted d-block mb-1">FOTO REPACK</span>
            <div class="upload-area" onclick="document.getElementById('in-rep').click()">
                <i class="ph ph-package"></i><img id="p-rep">
            </div>
            <input type="file" id="in-rep" class="d-none" accept="image/*" capture="environment">
        </div>
    </div>

    <button id="btn-submit" class="btn-send" disabled>KIRIM DATA</button>
    <script src="app.js"></script>
</body>
</html>
